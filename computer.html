<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>L0k1 - Laptop</title>
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- horni lista -->
<nav id="topbar">
    <div class="topbar-left icon">
        <i class="fa-solid fa-skull"></i>
        <span>L0k1 OS</span>
    </div>

    <div class="topbar-right">
        <span id="topbar-date"></span>
        <span id="topbar-time"></span>
    </div>
</nav>
<!-- plocha s ikonkama a oknem terminalu -->
<!-- TODO: New client chat tab/window-->
<div id="menu-wrapper">
    <div id="desktop-icons">
        <div class="desktop-icon icon" data-name="terminal">
            <i class="fa-solid fa-terminal"></i>
            <span>Terminal</span>
        </div>
        <div class="desktop-icon icon" data-name="files">
            <i class="fa-solid fa-folder"></i>
            <span>Files</span>
        </div>
        <div class="desktop-icon icon" data-name="nmap">
            <i class="fa-solid fa-eye"></i>
            <span>nmap</span>
        </div>
        <div class="desktop-icon icon" data-name="vpn">
            <i class="fa-solid fa-shield-halved"></i>
            <span>VPN</span>
        </div>
        <div class="desktop-icon icon" data-name="trash">
            <i class="fa-solid fa-trash"></i>
            <span>Trash</span>
        </div>
    </div>
    <!-- okno terminalu -->
    <div id="window">
        <div id="window-titlebar">
            <div class="window-buttons">
                <span class="window-btn btn-close"><i class="fa-solid fa-xmark"></i></span>
                <span class="window-btn btn-minimize"><i class="fa-solid fa-minus"></i></span>
                <span class="window-btn btn-maximize"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></span>
            </div>
            <span class="window-title">Terminal</span>
            <div class="window-buttons-spacer"></div>
        </div>
        <div id="menu">
        </div>
    </div>
</div>
<!-- spodni lista -->
<footer id="bottombar">
    <div class="bottombar-left">
        <i class="fa-solid fa-terminal" title="Terminal"></i>
        <i class="fa-solid fa-folder icon" title="Files"></i>
        <i class="fa-solid fa-globe icon" title="Browser"></i>
    </div>
    <div class="bottombar-right">
        <i class="fa-brands fa-usb icon" title="Flash Drive"></i>
        <i class="fa-brands fa-bluetooth-b icon" title="Bluetooth"></i>
        <i class="fa-solid fa-signal icon" title="Signal"></i>
        <i class="fa-solid fa-volume-medium icon" title="Volume"></i>
        <i class="fa-solid fa-wifi icon" title="WiFi"></i>
        <i class="fa-solid fa-battery-three-quarters icon" title="Battery"></i>
        <span>73%</span>
    </div>
</footer>
<!-- Q = zavrit PC -->
<script>
    document.addEventListener('keydown', (e) => {
        if (e.key === 'q') window.parent.postMessage('close-computer', '*')
    })
</script>
<!-- computer script -->
<script type="module" src="/src/computer.ts"></script>
</body>
</html>
